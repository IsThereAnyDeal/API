get:
  operationId: service-shops-v1
  tags:
    - Shops
  summary: Active shops
  description:
    Return active shops for specified country, with basic information about
    number of games and shop's last update.
  security: []
  parameters:
    - $ref: "../../docs.yaml#/components/parameters/country"
  responses:
    200:
      description: List of shops and their details
      content:
        application/json:
          schema:
            $ref: "./schemas/resp.service.shops.yaml"
          examples:
            success:
              summary: Short shop list example
              $ref: "./examples/shops.v1.success.yaml"
    400:
      $ref: "../../defs/error-response.yaml"

    default:
      $ref: "../../defs/error-response.yaml"